# =============================================================
# METROPOLIA TRANSPORT MRV — NGINX LOAD BALANCER
# Distributes traffic across all 'api' replica containers.
#
# Scale up:   docker compose up --scale api=5 --build
# Scale down: docker compose up --scale api=1
#
# Docker's internal DNS (127.0.0.11) resolves the hostname 'api'
# to all running replica IPs, giving nginx a real backend pool.
# =============================================================

worker_processes auto;                 # one worker per CPU core
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;           # max concurrent connections per worker
    use epoll;
    multi_accept on;
}

http {
    # ── DNS resolver (Docker's built-in) ──────────────────────
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Connection & timeout tuning ───────────────────────────
    keepalive_timeout     65;
    keepalive_requests    1000;
    send_timeout          30s;
    client_body_timeout   30s;
    client_max_body_size  50M;          # allow large CSV batch uploads

    # ── Gzip compression (reduces payload ~70%) ───────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 4;
    gzip_types      application/json text/plain text/csv;

    # ── Rate limiting zones ───────────────────────────────────
    # Burst protection: 100 req/s per IP, burst up to 200
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # Batch uploads: stricter limit — 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=batch_limit:5m rate=5r/s;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'rt=$request_time ut=$upstream_response_time '
                    'replica="$upstream_addr"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: FastAPI replicas ────────────────────────────
    # 'least_conn' sends each new request to the replica with
    # the fewest active connections — optimal for mixed workloads.
    # keepalive 32: maintains 32 persistent connections per worker
    # to each replica (avoids TCP handshake overhead at high RPS).
    upstream api_cluster {
        least_conn;
        server api:8000;               # Docker DNS expands to all replicas
        keepalive 32;
    }

    # ── Main server ───────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no rate limiting, no logging)
        location = /health {
            access_log off;
            proxy_pass         http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Batch upload — strict rate limit (CPU-heavy endpoint)
        location = /api/calculate/batch {
            limit_req zone=batch_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;            # batch jobs can be slow
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Expose which replica handled each request (useful for demo)
        add_header X-Served-By $upstream_addr always;

        # Return 503 when all backends are down
        error_page 502 503 504 @backend_down;
        location @backend_down {
            default_type application/json;
            return 503 '{"error":"All API replicas unavailable","status":503}';
        }
    }
}
